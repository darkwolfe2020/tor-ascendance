// ADMIN LOCATIONS
// ============================================================
let _locFilter = '';
let _locSort = { col:'name', dir:'asc' };
let _locOpen = new Set(['Planet','Character','Structure','Unclassified','unmanaged','playerStructs']);
function _locSetFilter(v) {
  _locFilter = v; render();
  setTimeout(()=>{ const el=document.getElementById('loc-filter-inp'); if(el){ el.focus(); el.setSelectionRange(v.length,v.length); }}, 0);
}
function _locToggle(key) { _locOpen.has(key) ? _locOpen.delete(key) : _locOpen.add(key); render(); }
function _locToggleSort(col) {
  if(_locSort.col===col) _locSort.dir=_locSort.dir==='asc'?'desc':'asc';
  else _locSort={col,dir:'asc'};
  render();
  setTimeout(()=>{ const el=document.getElementById('loc-filter-inp'); if(el) el.focus(); }, 0);
}

function _locSection(key, icon, title, items, rowFn, emptyMsg='') {
  const open = _locOpen.has(key);
  const count = items.length;
  if(!count && !emptyMsg) return '';
  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:2px 0" onclick="_locToggle('${key}')">
      <div class="card-title" style="margin:0">${icon} ${title} <span class="tag tag-grey">${count}</span></div>
      <span style="color:var(--text2);font-size:13px;padding-right:2px">${open?'▲':'▼'}</span>
    </div>
    ${open ? (count ? `<div class="tbl-wrap" style="margin-top:10px"><table style="width:100%">${rowFn(items)}</table></div>`
                    : `<div class="dim" style="padding:8px 0;font-size:13px">${emptyMsg}</div>`) : ''}
  </div>`;
}

function renderAdminLocations() {
  const locs = STATE.locations||[];
  const managedNames = new Set(locs.map(l=>l.name));
  const players = Object.values(STATE.players);
  const q = _locFilter.trim().toLowerCase();
  const visLabel = v => v==='all'
    ? '<span class="tag tag-grey">Everyone</span>'
    : `<span class="tag tag-blue">${esc(STATE.players[v]?.displayName||v)}</span>`;
  const locRows = (hdr) => `<thead><tr><th>Name</th>${hdr?'':'<th>Classification</th>'}<th>Visible To</th><th>Actions</th></tr></thead><tbody>`;
  const locRow = l => `<tr>
    <td class="gold">${esc(l.name)}</td>
    <td>${visLabel(l.visibility)}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-ghost btn-sm" onclick="showLocModal('${l.id}')">Edit</button>
      <button class="btn btn-red btn-sm" onclick="deleteLoc('${l.id}')">✕</button>
    </td></tr>`;

  const _locVal = (item, col) => {
    if(col==='visibility') return item.visibility==='all'?'Everyone':(STATE.players[item.visibility]?.displayName||item.visibility||'');
    return String(item[col]||'');
  };
  const locCmp = (a,b) => { const c=_locVal(a,_locSort.col).localeCompare(_locVal(b,_locSort.col)); return _locSort.dir==='asc'?c:-c; };
  const strCmp = (a,b) => { const c=a.localeCompare(b); return _locSort.dir==='asc'?c:-c; };
  const lth = (col,label) => { const on=_locSort.col===col; const icon=on?(_locSort.dir==='asc'?' ↑':' ↓'):'<span style="opacity:.22"> ⇅</span>'; return `<th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="_locToggleSort('${col}')">${label}${icon}</th>`; };
  const filter = arr => q ? arr.filter(l=>(l.name||'').toLowerCase().includes(q)) : arr;

  // ── Managed sections ──
  const planets    = filter(locs.filter(l=>l.classification==='Planet')).sort(locCmp);
  const chars      = filter(locs.filter(l=>l.classification==='Character')).sort(locCmp);
  const structs    = filter(locs.filter(l=>l.classification==='Structure')).sort(locCmp);
  const unclassed  = filter(locs.filter(l=>!['Planet','Character','Structure'].includes(l.classification))).sort(locCmp);

  // ── Unmanaged ──
  const structNames = new Set();
  players.forEach(p=>(p.structures||[]).forEach(s=>{if(s.name)structNames.add(s.name);}));
  const deployedLocs = new Set();
  players.forEach(p=>['formations','assets','miscItems'].forEach(k=>(p[k]||[]).forEach(item=>(item.deployments||[]).forEach(d=>{
    if(d.location&&d.location.trim()) deployedLocs.add(d.location.trim());
  }))));
  const unmanaged = [...deployedLocs].filter(n=>!managedNames.has(n)&&!structNames.has(n))
    .filter(n=>!q||n.toLowerCase().includes(q)).sort(strCmp);

  // ── Player structures ──
  const allStructs = [];
  players.forEach(p=>(p.structures||[]).forEach(s=>{if(s.name) allStructs.push({name:s.name,location:s.location||'',player:p.displayName,pid:p.id});}));
  const filtStructs = (q ? allStructs.filter(s=>s.name.toLowerCase().includes(q)||s.player.toLowerCase().includes(q)) : allStructs).sort(locCmp);

  const totalManaged = planets.length+chars.length+structs.length+unclassed.length;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-weight:700;font-size:15px">Managed Locations</span>
      <span class="tag tag-grey">${locs.length} total</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="loc-filter-inp" type="text" placeholder="Filter locations…" value="${esc(_locFilter)}"
        oninput="_locSetFilter(this.value)"
        style="background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 10px;font-size:13px;font-family:inherit;width:200px">
      <button class="btn btn-green btn-sm" onclick="showLocModal(null)">+ Add Location</button>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${_locSection('Planet', LOC_ICON['Planet'], 'Planets', planets, items=>`
      <thead><tr>${lth('name','Name')}${lth('visibility','Visible To')}<th>Actions</th></tr></thead><tbody>
      ${items.map(locRow).join('')}</tbody>`, 'No planets match filter.')}
    ${_locSection('Character', LOC_ICON['Character'], 'Characters', chars, items=>`
      <thead><tr>${lth('name','Name')}${lth('visibility','Visible To')}<th>Actions</th></tr></thead><tbody>
      ${items.map(locRow).join('')}</tbody>`, 'No characters match filter.')}
    ${_locSection('Structure', LOC_ICON['Structure'], 'Structures', structs, items=>`
      <thead><tr>${lth('name','Name')}${lth('visibility','Visible To')}<th>Actions</th></tr></thead><tbody>
      ${items.map(locRow).join('')}</tbody>`, 'No structures match filter.')}
    ${unclassed.length ? _locSection('Unclassified', '❓', 'Unclassified', unclassed, items=>`
      <thead><tr>${lth('name','Name')}${lth('visibility','Visible To')}<th>Actions</th></tr></thead><tbody>
      ${items.map(locRow).join('')}</tbody>`) : ''}
    ${!totalManaged&&!q ? `<div class="card"><div class="dim" style="padding:8px">No locations defined. Use + Add Location to create some.</div></div>` : ''}
    ${unmanaged.length ? _locSection('unmanaged', '⭐', 'Unmanaged Deployment Locations', unmanaged, items=>`
      <thead><tr>${lth('name','Name')}<th>Actions</th></tr></thead><tbody>
      ${items.map(n=>`<tr><td>${esc(n)}</td><td><button class="btn btn-green btn-sm" onclick="showLocModal(null,'${n.replace(/'/g,"\\'")}','Planet','all')">+ Add</button></td></tr>`).join('')}</tbody>`) : ''}
    ${filtStructs.length ? _locSection('playerStructs', '🏛', 'Player Structures', filtStructs, items=>`
      <thead><tr>${lth('name','Name')}${lth('player','Player')}${lth('location','Location')}<th>In List</th><th>Actions</th></tr></thead><tbody>
      ${items.map(s=>{const inList=managedNames.has(s.name);return`<tr>
        <td class="gold">${esc(s.name)}</td><td class="dim">${esc(s.player)}</td><td class="dim">${esc(s.location)||'—'}</td>
        <td>${inList?'<span class="tag tag-grey">✓ Yes</span>':'<span class="dim">No</span>'}</td>
        <td>${inList?'':'<button class="btn btn-green btn-sm" onclick="showLocModal(null,\''+s.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\',\'Structure\',\'all\')">+ Add</button>'}</td>
      </tr>`;}).join('')}</tbody>`) : ''}
  </div>`;
}

function showLocModal(id, prefillName='', prefillCls='Planet', prefillVis='all') {
  const loc = id ? (STATE.locations||[]).find(l=>l.id===id) : null;
  const players = Object.values(STATE.players);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'loc-modal-overlay';
  overlay.innerHTML = `<div class="modal" style="min-width:360px;max-width:480px">
    <h2 style="margin-bottom:16px">${loc?'Edit':'Add'} Location</h2>
    <div class="form-row"><label>Name</label>
      <input type="text" id="loc-m-name" value="${esc(loc?.name||prefillName)}" placeholder="e.g. Dromund Kaas, Lord Rupbert, The Citadel">
    </div>
    <div class="form-row"><label>Classification</label>
      <select id="loc-m-cls">
        ${['Planet','Character','Structure'].map(c=>`<option value="${c}" ${(loc?.classification||prefillCls)===c?'selected':''}>${LOC_ICON[c]} ${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-row"><label>Visible To</label>
      <select id="loc-m-vis">
        <option value="all" ${(loc?loc.visibility==='all':prefillVis==='all')?'selected':''}>🌐 Everyone (Generic)</option>
        ${players.map(p=>`<option value="${p.id}" ${(loc?loc.visibility===p.id:prefillVis===p.id)?'selected':''}>👤 ${esc(p.displayName)} only</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('loc-modal-overlay').remove()">Cancel</button>
      <button class="btn btn-gold" onclick="saveLoc(${id?`'${id}'`:'null'})">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('loc-m-name')?.focus(), 50);
}

function saveLoc(id) {
  const name = document.getElementById('loc-m-name')?.value.trim();
  const classification = document.getElementById('loc-m-cls')?.value;
  const visibility = document.getElementById('loc-m-vis')?.value;
  if(!name) { notify('Name is required.', true); return; }
  STATE.locations = STATE.locations||[];
  if(id) {
    const loc = STATE.locations.find(l=>l.id===id);
    if(loc) { loc.name=name; loc.classification=classification; loc.visibility=visibility; }
  } else {
    STATE.locations.push({id:newId(), name, classification, visibility});
  }
  saveState();
  document.getElementById('loc-modal-overlay')?.remove();
  notify(id?'Location updated.':'Location added.');
  render();
}

function deleteLoc(id) {
  if(!confirm('Delete this location?')) return;
  STATE.locations = (STATE.locations||[]).filter(l=>l.id!==id);
  saveState(); notify('Location deleted.'); render();
}

function changeMasterPassword() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal" style="min-width:320px">
    <h2>Change Master Password</h2>
    <p class="dim" style="margin-bottom:16px">This password grants admin access and can log into any player account.</p>
    <div class="form-row"><label>New Password</label><input type="password" id="mpw-new" style="width:100%"></div>
    <div class="form-row"><label>Confirm</label><input type="password" id="mpw-confirm" style="width:100%" onkeydown="if(event.key==='Enter')doChangeMasterPw()"></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-gold" onclick="doChangeMasterPw()">Save</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

function doChangeMasterPw() {
  const pw = document.getElementById('mpw-new').value;
  const c = document.getElementById('mpw-confirm').value;
  const err = document.getElementById('mpw-err');
  if (!pw) { err.textContent = 'Password cannot be empty.'; err.style.display='block'; return; }
  if (pw !== c) { err.textContent = 'Passwords do not match.'; err.style.display='block'; return; }
  STATE.adminPassword = pw;
  document.querySelector('.modal-overlay').remove();
  saveState(); notify('Master password updated.');
}

function managePlayerPasswords() {
  const rows = Object.values(STATE.players).map(p => `
    <tr>
      <td style="padding:8px 0">${esc(p.displayName)}</td>
      <td><input type="password" placeholder="${p.password ? '••••••••' : 'No password'}" id="ppw-${p.id}"

  modal.className = 'modal-overlay';

    <h2>Player Passwords</h2>
    <p class="dim" style="margin-bottom:16px">Leave blank and click Set to keep existing password. Use Clear to remove a password.</p>

function setPlayerPassword(id) {

}
function clearPlayerPassword(id) {
  delete STATE.players[id].password;
  saveState(); notify(`Password cleared for ${STATE.players[id].displayName}.`);
  document.getElementById('ppw-modal')?.remove();
  managePlayerPasswords();
}

function exportData() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rta_data_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.players) throw new Error('Invalid format');
        if(!confirm('This will replace ALL current data. Continue?')) return;
        STATE = data; saveState(); notify('Data imported.'); render();
      } catch(err) { notify('Import failed: ' + err.message, true); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// INIT
// ============================================================
initApp();
</script>
</body>
</html>
