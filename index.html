<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Old Republic: Ascendance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --border: #2a2a38;
    --red: #c0392b;
    --red2: #e74c3c;
    --gold: #d4af37;
    --gold2: #f0d060;
    --text: #d0d0e0;
    --text2: #8888aa;
    --green: #27ae60;
    --blue: #2980b9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Trebuchet MS', sans-serif; font-size: 14px; min-height: 100vh; }

  /* NAV */
  #topbar { background: var(--bg2); border-bottom: 1px solid var(--red); padding: 0 16px; display: flex; align-items: center; height: 48px; gap: 16px; position: sticky; top: 0; z-index: 100; }
  #topbar .logo { color: var(--gold); font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
  #topbar .logo span { color: var(--red2); }
  #nav-links { display: flex; gap: 4px; flex: 1; }
  .nav-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px 12px; border-radius: 4px; font-size: 13px; transition: all 0.15s; }
  .nav-btn:hover, .nav-btn.active { background: var(--bg3); color: var(--gold); }
  #topbar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  #player-badge { color: var(--gold2); font-size: 13px; font-weight: 600; }
  .btn { display: inline-block; padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: var(--red2); }
  .btn-gold { background: var(--gold); color: #111; }
  .btn-gold:hover { background: var(--gold2); }
  .btn-sm { padding: 3px 9px; font-size: 12px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-blue { background: var(--blue); color: #fff; }

  /* MAIN */
  #app { padding: 14px; max-width: 1400px; margin: 0 auto; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .card-title { color: var(--gold); font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* STAT BOX */
  .stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px; text-align: center; }
  .stat-box .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-box .value { font-size: 22px; font-weight: 700; color: var(--gold); }
  .stat-box .value.neg { color: var(--red2); }
  .stat-box .value.pos { color: var(--green); }

  /* TABLES */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--bg3); color: var(--text2); font-weight: 600; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: var(--green); }
  .neg { color: var(--red2); }
  .gold { color: var(--gold); }
  .dim { color: var(--text2); }

  /* TAGS */
  .tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; margin: 1px; }
  .tag-red { background: rgba(192,57,43,0.25); color: var(--red2); border: 1px solid var(--red); }
  .tag-gold { background: rgba(212,175,55,0.2); color: var(--gold); border: 1px solid var(--gold); }
  .tag-green { background: rgba(39,174,96,0.2); color: var(--green); border: 1px solid var(--green); }
  .tag-blue { background: rgba(41,128,185,0.2); color: var(--blue); border: 1px solid var(--blue); }
  .tag-grey { background: rgba(255,255,255,0.07); color: var(--text2); border: 1px solid var(--border); }

  /* FORMS */
  input, select, textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 6px 10px; font-size: 13px; font-family: inherit; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  textarea { resize: vertical; min-height: 60px; }
  label { color: var(--text2); font-size: 12px; display: block; margin-bottom: 4px; }
  .form-row { margin-bottom: 12px; }
  .form-row-inline { display: flex; gap: 10px; align-items: flex-end; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 24px; min-width: 420px; max-width: 640px; width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal h2 { color: var(--gold); margin-bottom: 16px; font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }

  /* LOGIN PAGE */
  #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
  #login-page h1 { color: var(--gold); font-size: 32px; letter-spacing: 4px; text-transform: uppercase; }
  #login-page p { color: var(--text2); letter-spacing: 1px; }
  .player-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 900px; width: 100%; }
  .player-card { width: 180px; }
  .player-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .player-card:hover { border-color: var(--gold); background: var(--bg3); }
  .player-card .pc-name { color: var(--gold); font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .player-card .pc-char { color: var(--text2); font-size: 12px; }
  .player-card .pc-rank { color: var(--red2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* DEPLOY CONTROL */
  .deploy-ctrl { display: flex; align-items: center; gap: 6px; }
  .deploy-ctrl input { width: 55px; text-align: center; }
  .deploy-ctrl .sep { color: var(--text2); }

  /* NOTIFICATIONS */
  #notif { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .notif-item { background: var(--bg3); border-left: 3px solid var(--green); padding: 10px 14px; border-radius: 4px; font-size: 13px; min-width: 220px; animation: slideIn 0.2s; }
  .notif-item.err { border-color: var(--red2); }
  @keyframes slideIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }

  /* SECTION TABS */
  .tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* MISC */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-header h3 { color: var(--gold); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .text-block { color: var(--text2); line-height: 1.6; font-size: 13px; background: var(--bg3); border-radius: 4px; padding: 10px; margin-top: 4px; word-break: break-word; white-space: pre-wrap; }
  .empty-row td { color: var(--text2); text-align: center; padding: 20px; font-style: italic; }
  .badge-deployed { color: var(--green); font-size: 11px; font-weight: 600; }
  .badge-undeployed { color: var(--text2); font-size: 11px; }
  .inline-edit { cursor: pointer; border-bottom: 1px dashed var(--border); }
  .inline-edit:hover { border-color: var(--gold); color: var(--gold); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .admin-ta { height:30px; resize:none; overflow:hidden; box-sizing:border-box; vertical-align:top; width:100%; transition:height 0.12s ease; }
  .admin-ta:focus { height:auto; overflow:auto; outline:1px solid var(--gold); border-color:var(--gold); }
  .shop-item-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .shop-item-card h4 { color: var(--gold); font-size: 13px; margin-bottom: 4px; }
  .shop-item-card .price { color: var(--red2); font-weight: 700; font-size: 14px; margin: 6px 0; }
  .shop-item-card p { color: var(--text2); font-size: 12px; line-height: 1.4; }
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  #pending-badge { background: var(--red); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 11px; margin-left: 4px; }
  .img-paste-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 20px; text-align: center; cursor: pointer; min-height: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; transition: border-color 0.2s; }
  .img-paste-zone:focus, .img-paste-zone:hover { border-color: var(--gold); outline: none; }
  .paste-hint { color: var(--text2); font-size: 13px; }
  .char-portrait { width: 100%; height: 100%; min-height: 220px; object-fit: cover; object-position: top; border-radius: 6px; border: 1px solid var(--border); display: block; }
  /* Location chip selector */
  .loc-chip { display:inline-flex; align-items:center; gap:6px; background:var(--bg3); border:1px solid var(--gold); border-radius:20px; padding:4px 10px; font-size:12px; color:var(--gold); white-space:nowrap; }
  .loc-chip .lx { cursor:pointer; color:var(--text2); font-size:11px; margin-left:2px; }
  .loc-chip .lx:hover { color:var(--red2); }
  .loc-selector { position:relative; flex:1; min-width:0; }
  .loc-search-inp { background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:5px 8px; font-size:13px; width:100%; font-family:inherit; }
  .loc-search-inp:focus { border-color:var(--gold); outline:none; }
  .loc-dd { position:absolute; top:calc(100% + 2px); left:0; min-width:180px; width:max-content; max-width:320px; background:var(--bg2); border:1px solid var(--border); border-radius:4px; z-index:400; max-height:200px; overflow-y:auto; box-shadow:0 6px 20px rgba(0,0,0,0.6); }
  .loc-opt { padding:6px 12px; cursor:pointer; font-size:13px; }
  .loc-opt:hover { background:var(--bg3); color:var(--gold); }
  .loc-sec { padding:3px 12px 2px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); background:var(--bg); pointer-events:none; }
  .loc-create { color:var(--green); border-top:1px solid var(--border); }
  /* Deployed forces accordion */
  .world-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; margin-bottom:12px; overflow:hidden; }
  .world-hdr { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:background 0.15s; user-select:none; }
  .world-hdr:hover { background:var(--bg3); }
  .world-hdr .world-name { color:var(--gold); font-weight:700; font-size:14px; letter-spacing:1px; text-transform:uppercase; }
  .world-hdr .world-meta { color:var(--text2); font-size:12px; margin-left:auto; }
  .world-hdr .chevron { color:var(--text2); font-size:12px; }
  .world-body { padding:0 12px 12px; }
  .subloc-row { border:1px solid var(--border); border-radius:4px; margin-bottom:6px; overflow:hidden; }
  .subloc-hdr { display:flex; align-items:center; gap:8px; padding:7px 12px; cursor:pointer; background:var(--bg3); transition:background 0.15s; user-select:none; }
  .subloc-hdr:hover { background:var(--bg); }
  .subloc-hdr .subloc-name { font-weight:600; font-size:13px; }
  .subloc-hdr .subloc-meta { color:var(--text2); font-size:11px; margin-left:auto; }
  .subloc-body { padding:10px 12px; border-top:1px solid var(--border); }
  .struct-info { background:var(--bg); border-radius:4px; padding:8px 12px; margin-bottom:8px; font-size:12px; border-left:3px solid var(--blue); }
  .loyalty-high { color: var(--green); } .loyalty-medium { color: var(--gold); } .loyalty-low { color: var(--red2); }

</style>
</head>
<body>
<div id="topbar">
  <div class="logo">The Old Republic: <span>Ascendance</span></div>
  <div id="nav-links"></div>
  <div class="right">
    <div id="theme-switcher" style="display:flex;gap:5px;align-items:center;margin-right:10px" title="Switch theme">
      <button id="theme-btn-default"      title="Classic"      onclick="setTheme('default')"      style="width:13px;height:13px;border-radius:50%;background:#d4af37;border:2px solid transparent;cursor:pointer;padding:0;transition:border-color 0.15s"></button>
      <button id="theme-btn-holographic"  title="Holographic"  onclick="setTheme('holographic')"  style="width:13px;height:13px;border-radius:50%;background:#00ccff;border:2px solid transparent;cursor:pointer;padding:0;transition:border-color 0.15s"></button>
      <button id="theme-btn-sith"         title="Sith"         onclick="setTheme('sith')"         style="width:13px;height:13px;border-radius:50%;background:#cc1133;border:2px solid transparent;cursor:pointer;padding:0;transition:border-color 0.15s"></button>
    </div>
    <span id="player-badge"></span>
    <button class="btn btn-ghost btn-sm" id="logout-btn" style="display:none" onclick="logout()">Sign Out</button>
  </div>
</div>
<div id="app"></div>
<div id="notif"></div>

const SUPABASE_URL = 'https://aosvuxygkbpmsedlnuyt.supabase.co';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let _saveTimer = null;

function newId() { return '_' + Math.random().toString(36).slice(2,9); }

function loadState() {
  try {
    const s = localStorage.getItem('rta_state');
    if(s) {
      const parsed = JSON.parse(s);
      if((parsed._version||0) >= DATA_VERSION) return parsed;
    }
  } catch(e){}
  return null;
}
function saveState() {
  STATE._version = DATA_VERSION;
  localStorage.setItem('rta_state', JSON.stringify(STATE));
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      await sb.from('game_state').upsert({ id: 'main', data: STATE, updated_at: new Date().toISOString() });
    } catch(e) { console.error('Supabase save failed:', e); }
  }, 1500);
}
function migrateState(state) {
  Object.values(state.players||{}).forEach(p => {
    ['formations','assets','miscItems','ships'].forEach(key => {
      (p[key]||[]).forEach(item => {
        if(!item.deployments) {
          const dep = Number(item.deployed)||0;
          item.deployments = dep>0 ? [{location:item.location||'',qty:dep}] : [];
          delete item.deployed;
          delete item.location;
        }
      });
    });
    if(!p.ships) p.ships = [];
  });
  // Migrate to managed locations
  if(!state.locations || !state.locations.length) {
    const customs = (state.customLocations||[]).filter(n=>!PLANETS.includes(n));
    state.locations = [
      ...PLANETS.map(name=>({id:newId(),name,classification:'Planet',visibility:'all'})),
      ...customs.map(name=>({id:newId(),name,classification:'Planet',visibility:'all'}))
    ];
  }
  // Migrate populations: totalGdp/taxes → taxPercent (calculated)
  Object.values(state.players||{}).forEach(p => {
    (p.populations||[]).forEach(row => {
      if(row.taxPercent === undefined) {
        const gdp = (row.gdpPerCapita||0) * (row.adultPop||0);
        row.taxPercent = gdp > 0 ? Math.round(((row.taxes||0) / gdp) * 100) : 0;
      }
      delete row.totalGdp;
      delete row.taxes;
    });
  });
  return state;
}

function fmt(n) {
  if(n === null || n === undefined || n === '') return '-';
  const num = Number(n);
  if(isNaN(num)) return n;
  if(num < 0) return '-' + fmt(-num);
  return num.toLocaleString();
}
function fmtCredits(n) {
  const num = Number(n);
  if(isNaN(num)) return n;
  if(num < 0) return `<span class="neg">${CREDIT_SVG}(${fmt(-num)})</span>`;
  if(num > 0) return `<span class="pos">${CREDIT_SVG}${fmt(num)}</span>`;
  return '<span class="dim">-</span>';
}
// Credit-formatted number with icon, no color coding
function fmtC(n) {
  if(n===null||n===undefined||n==='') return '-';
  const num = Number(n);
  if(isNaN(num)) return String(n);
  if(num<0) return CREDIT_SVG+'('+fmt(-num)+')';
  return CREDIT_SVG+fmt(num);
}
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function numInput(el) {
  const s = el.value;
  const neg = s.startsWith('-');
  const raw = s.replace(/[^0-9]/g,'');
  if(!raw) { el.value = neg ? '-' : ''; return; }
  const pos = el.selectionStart;
  const formatted = (neg?'-':'') + parseInt(raw,10).toLocaleString('en-US');
  el.value = formatted;
  const diff = formatted.length - s.length;
  try { el.setSelectionRange(pos+diff, pos+diff); } catch(e) {}
}
function unNum(v) { return parseFloat(String(v).replace(/,/g,''))||0; }
function adminTaFocus(el) { el.style.overflow='auto'; el.style.height='auto'; el.style.height=Math.max(el.scrollHeight,80)+'px'; }
function adminTaBlur(el)  { el.style.overflow='hidden'; el.style.height='30px'; }
function fmtNum(v) { const n=parseFloat(v)||0; return n===0?'0':n.toLocaleString('en-US'); }

// Summarise category breakdown for a list, e.g. "2 Squad · 1 Fire Team"
function catSummary(list) {
  if(!list||!list.length) return '';
  const counts = {};
  list.forEach(item => {
    const c = (item.category||'').trim() || 'Uncategorized';
    counts[c] = (counts[c]||0) + 1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`${n} ${c}`).join(' · ');
}

function depStrength(entries) {

function getStructureForces(p, structName) {
  const forces = [];
  ['formations','assets','miscItems'].forEach(key => {
    const type = key==='formations'?'Formation':key==='assets'?'Asset':'Misc';
    (p[key]||[]).forEach(item => {
      (item.deployments||[]).forEach(d => {

      });
    });
  });
  return forces;
}
function getPersonForces(p, personName) {
  // formations/assets/misc deployed to this person, plus ships with nested forces aboard
  const forces = getStructureForces(p, personName);
  (p.ships||[]).forEach(item => {
    (item.deployments||[]).forEach(d => {
      if(d.location===personName && Number(d.qty)>0) {

        forces.push({ name:item.name, qty:Number(d.qty), type:'Ship', category:item.class||'', role:item.role||'', note:d.note||'', strength:'', aboard });

  });

// ============================================================
const _sort = {};
function _toggleSort(tid, col) {
  if(_sort[tid] && _sort[tid].col === col) _sort[tid].dir = _sort[tid].dir==='asc'?'desc':'asc';
  else _sort[tid] = { col, dir:'asc' };
  render();
}
function _sortData(arr, tid) {
  const s = _sort[tid];
  if(!s||!s.col) return arr;
  return [...arr].sort((a,b) => {
    let av = a[s.col]??'', bv = b[s.col]??'';
    const an = parseFloat(String(av).replace(/[^0-9.-]/g,'')), bn = parseFloat(String(bv).replace(/[^0-9.-]/g,''));
    if(!isNaN(an)&&!isNaN(bn)&&String(av).trim()!=='') return s.dir==='asc'?an-bn:bn-an;
    av=String(av).toLowerCase(); bv=String(bv).toLowerCase();
    return s.dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
  });
}
function _th(tid, col, label, extra='') {
  const s=_sort[tid]; const on=s&&s.col===col;
  const icon=on?(s.dir==='asc'?' ↑':' ↓'):'<span style="opacity:.22"> ⇅</span>';
  return `<th ${extra} style="cursor:pointer;user-select:none;white-space:nowrap" onclick="_toggleSort('${tid}','${col}')">${label}${icon}</th>`;
}

      <button class="nav-btn ${currentView==='deployed'?'active':''}" onclick="navigate('deployed')">Deployed Forces</button>
      <button class="nav-btn ${currentView==='finance'?'active':''}" onclick="navigate('finance')">Finance</button>
      <button class="nav-btn ${currentView==='shop'?'active':''}" onclick="navigate('shop')">Shop</button>
      <button class="nav-btn ${currentView==='todo'?'active':''}" onclick="navigate('todo')">GM Tasks</button>
    `;
  } else if(isAdmin) {
    badge.textContent = '⚙ GM';
    logoutBtn.style.display = 'inline-block';
    navLinks.innerHTML = `
      <button class="nav-btn ${currentView==='admin-overview'?'active':''}" onclick="navigate('admin-overview')">Overview</button>
      <button class="nav-btn ${currentView==='admin-players'?'active':''}" onclick="navigate('admin-players')">Players</button>
      <button class="nav-btn ${currentView==='admin-shop'?'active':''}" onclick="navigate('admin-shop')">Shop Items</button>
      <button class="nav-btn ${currentView==='admin-requests'?'active':''}" onclick="navigate('admin-requests')">Requests${(pendingCount()+todoCount())>0?`<span id="pending-badge">${pendingCount()+todoCount()}</span>`:''}</button>
      <button class="nav-btn ${currentView==='admin-deploy'?'active':''}" onclick="navigate('admin-deploy')">Deployments</button>
      <button class="nav-btn ${currentView==='admin-locations'?'active':''}" onclick="navigate('admin-locations')">Locations</button>
    `;
  } else {
    badge.textContent = '';
    logoutBtn.style.display = 'none';
    navLinks.innerHTML = '';
  }

  // View
  let _viewHtml = '';
  switch(currentView) {
    case 'login': _viewHtml = renderLogin(); break;
    case 'dashboard': _viewHtml = renderDashboard(); break;
    case 'character': _viewHtml = renderCharacter(); break;
    case 'assets': _viewHtml = renderAssets(); break;
    case 'deployed': _viewHtml = renderDeployed(); break;
    case 'finance': _viewHtml = renderFinance(); break;
    case 'shop': _viewHtml = renderShop(); break;
    case 'todo': _viewHtml = renderTodo(); break;
    case 'admin-overview': _viewHtml = renderAdminOverview(); break;
    case 'admin-players': _viewHtml = renderAdminPlayers(); break;
    case 'admin-shop': _viewHtml = renderAdminShop(); break;
    case 'admin-requests': _viewHtml = renderAdminRequests(); break;
    case 'admin-deploy': _viewHtml = renderAdminDeploy(); break;
    case 'admin-locations': _viewHtml = renderAdminLocations(); break;
    default: _viewHtml = renderLogin();
  }
  // Prepend pending-purchases banner for player views (not shop — it already lists them there)
  if(currentPlayer && !isAdmin && currentView !== 'login' && currentView !== 'shop') {
    _viewHtml = renderPendingBanner() + _viewHtml;
  }
  const _sy = window.scrollY;
  app.innerHTML = _viewHtml;
  window.scrollTo(0, _sy);
}

function pendingCount() {
  const p = (STATE.purchaseRequests||[]).filter(r=>r.status==='pending').length;
  const d = (STATE.deploymentRequests||[]).filter(r=>r.status==='pending').length;
  return p + d;
}
let _pendingBannerOpen = false;
function _togglePendingBanner() { _pendingBannerOpen = !_pendingBannerOpen; render(); }
function renderPendingBanner() {
  const pending = (STATE.purchaseRequests||[]).filter(r=>r.playerId===currentPlayer && r.status==='pending');
  if(!pending.length) return '';
  return `<div style="background:var(--bg2);border:1px solid var(--gold);border-radius:6px;margin-bottom:12px;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;user-select:none" onclick="_togglePendingBanner()">
      <div style="display:flex;align-items:center;gap:8px">

      </div>
      <span style="color:var(--text2);font-size:12px">${_pendingBannerOpen?'▲ Hide':'▼ Show'}</span>
    </div>
    ${_pendingBannerOpen?`<div style="border-top:1px solid var(--border);padding:4px 14px 8px">
      ${pending.map(r=>`<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);last-child:border:0">
        <span style="flex:1;font-weight:600">${esc(r.itemName)}</span>

        <span style="color:var(--gold2);font-size:13px;font-weight:600">${fmtC(r.totalCost)}</span>

function todoCount() {
  return Object.values(STATE.players).filter(p=>p.todoNote&&p.todoNote.trim()).length;
}

function renderLogin() {
  const cards = Object.values(STATE.players).map(p => {
    return `<div class="player-card" onclick="showPlayerLogin('${p.id}')">
      <div class="pc-name">${esc(p.displayName)}</div>

      <div class="dim" style="font-size:11px;margin-top:6px">${p.password ? '🔒 Password protected' : '🔓 No password set'}</div>
    </div>`;
  }).join('');
  return `<div id="login-page">
    <h1>The Old Republic: <span>Ascendance</span></h1>
    <p>Select your character to continue</p>
    <div class="player-grid">${cards}</div>
    <div style="margin-top:32px;text-align:center">
      <button class="btn btn-ghost btn-sm" onclick="showAdminLogin()">⚙ Admin Access</button>

function showPlayerLogin(id) {
  const p = STATE.players[id];
  if (!p) return;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'player-login-modal';
  modal.innerHTML = `<div class="modal" style="min-width:300px;text-align:center">
    <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px">${esc(p.displayName)}</div>
    <div class="dim" style="margin-bottom:20px">${esc(p.character.name)} · ${esc(p.character.rank)}</div>
    <input type="password" id="plogin-pw" placeholder="Password"
      onkeydown="if(event.key==='Enter')doPlayerLogin('${id}')"
      style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;font-size:14px;width:100%;outline:none;margin-bottom:8px">
    <div id="plogin-err" style="color:var(--red2);font-size:12px;margin-bottom:10px;display:none"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('player-login-modal').remove()">Cancel</button>
      <button class="btn btn-gold" style="flex:1" onclick="doPlayerLogin('${id}')">Enter</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('plogin-pw')?.focus(), 50);
}

function doPlayerLogin(id) {
  const p = STATE.players[id];
  const pw = document.getElementById('plogin-pw')?.value || '';
  const errEl = document.getElementById('plogin-err');
  const master = STATE.adminPassword || 'rta2024';
  if (pw === master || pw === (p.password || '') || (!p.password && pw === '')) {
    document.getElementById('player-login-modal')?.remove();
    currentPlayer = id; isAdmin = false; currentView = 'dashboard'; render(); return;
  }
  errEl.textContent = 'Incorrect password.'; errEl.style.display = 'block';
}

function renderDashboard() {
  const p = STATE.players[currentPlayer];
  if(!p) return '';
  const net = calcNet(p);
  const bal = calcBalance(p);
  const proj = bal + net;
  const formations = p.formations||[];
  const assets = p.assets||[];
  const totalDeployedCount = formations.reduce((s,f)=>s+totalDeployed(f),0) + assets.reduce((s,a)=>s+totalDeployed(a),0);
  const totalUndeployed = formations.reduce((s,f)=>s+(Number(f.undeployed)||0),0) + assets.reduce((s,a)=>s+(Number(a.undeployed)||0),0);

  return `
  <div class="grid4" style="margin-bottom:16px">
    <div class="stat-box"><div class="label">Balance</div><div class="value ${bal<0?'neg':''}">${fmtC(bal)}</div></div>
    <div class="stat-box"><div class="label">Net Income</div><div class="value ${net<0?'neg':'pos'}">${net>=0?'+':'-'}${CREDIT_SVG}${fmt(Math.abs(net))}</div></div>
    <div class="stat-box"><div class="label">Projected Balance</div><div class="value ${proj<0?'neg':''}">${fmtC(proj)}</div></div>
    <div class="stat-box"><div class="label">Forces</div><div class="value">${totalDeployedCount}<span style="color:var(--text2);font-size:14px"> dep / ${totalUndeployed} undep</span></div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Character Summary</div>
      <table><tbody>
        <tr><td class="dim" style="width:130px">Name</td><td class="gold">${esc(p.character.name)}</td></tr>
        <tr><td class="dim">Rank</td><td>${esc(p.character.rank)}</td></tr>
        <tr><td class="dim">Age</td><td>${esc(p.character.age)}</td></tr>
        <tr><td class="dim">Species</td><td>${esc(p.character.species)}</td></tr>
        <tr><td class="dim">Ideology</td><td>${esc(p.character.ideology)}</td></tr>
        <tr><td class="dim">Archetype</td><td>${esc(p.character.archetype)}</td></tr>
        <tr><td class="dim">Lightsaber Form</td><td>${esc(p.character.lightsaberForm)}</td></tr>
      </tbody></table>
      <div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="navigate('character')">View Full Sheet</button></div>
    </div>
    <div class="card">
      <div class="card-title">Income Breakdown</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Source</th><th>Qty</th><th class="td-num">Income</th><th class="td-num">Upkeep</th><th class="td-num">Total Net</th></tr></thead>
        <tbody>
          ${(p.income||[]).slice(0,8).map(r=>`<tr>
            <td>${esc(r.name)}</td>
            <td class="dim">${r.quantity}</td>
            <td class="td-num pos">${r.income>0?fmtC(r.income):''}</td>
            <td class="td-num neg">${r.upkeep>0?CREDIT_SVG+'('+fmt(r.upkeep)+')':''}</td>
            <td class="td-num ${Number(r.totalNet)>=0?'pos':'neg'}">${Number(r.totalNet)>=0?'+':'-'}${CREDIT_SVG}${fmt(Math.abs(Number(r.totalNet)))}</td>
          </tr>`).join('')}
          ${(p.income||[]).length===0?'<tr class="empty-row"><td colspan="5">No income entries</td></tr>':''}
          ${(p.income||[]).length>8?`<tr><td colspan="5" class="dim" style="text-align:center;font-size:12px">+${(p.income.length-8)} more — <a href="#" onclick="navigate('finance');return false" style="color:var(--gold)">view all</a></td></tr>`:''}
        </tbody>
      </table></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Formations &amp; Assets Overview <button class="btn btn-ghost btn-sm" onclick="navigate('assets')">Manage</button></div>
    <div class="grid2">
      <div>
        <div style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Formations (${formations.length})</div>
        <table><thead><tr><th>Name</th><th>Qty</th><th>Deployed</th><th>Location(s)</th></tr></thead><tbody>
          ${formations.slice(0,6).map(f=>{const td=totalDeployed(f);const locs=(f.deployments||[]).filter(d=>d.qty>0).map(d=>d.location||'?').join(', ')||'—';return`<tr><td>${esc(f.name)}</td><td class="dim">${f.quantity}</td><td><span class="badge-deployed">${td}</span><span class="dim"> / ${f.undeployed}</span></td><td class="dim" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(locs)}</td></tr>`;}).join('')}
          ${formations.length===0?'<tr class="empty-row"><td colspan="4">None</td></tr>':''}
        </tbody></table>
      </div>
      <div>
        <div style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Key Assets (${assets.length})</div>
        <table><thead><tr><th>Name</th><th>Qty</th><th>Deployed</th><th>Location(s)</th></tr></thead><tbody>
          ${assets.slice(0,6).map(a=>{const td=totalDeployed(a);const locs=(a.deployments||[]).filter(d=>d.qty>0).map(d=>d.location||'?').join(', ')||'—';return`<tr><td>${esc(a.name)}</td><td class="dim">${a.quantity}</td><td><span class="badge-deployed">${td}</span><span class="dim"> / ${a.undeployed}</span></td><td class="dim" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(locs)}</td></tr>`;}).join('')}
          ${assets.length===0?'<tr class="empty-row"><td colspan="4">None</td></tr>':''}
        </tbody></table>
      </div>
    </div>
  </div>`;
}

// ============================================================
// DEPLOYED FORCES — ACCORDION
// ============================================================
let _deployedOpen = {};
let _deployedSubOpen = {};

function _buildLocationTree(p) {
  // tree: { worldName: { structures:{}, ships:{}, persons:{}, generic:[] } }
  const tree = {};
  const ensureWorld = w => { if(!tree[w]) tree[w] = { structures:{}, ships:{}, persons:{}, generic:[] }; };

  // Register every structure under its planet
  (p.structures||[]).forEach(s => {
    const world = (s.location||'').trim() || 'Unknown';
    ensureWorld(world);
    if(s.name && !tree[world].structures[s.name]) {
      tree[world].structures[s.name] = { obj:s, forces:[] };
    }
  });
  const structIndex = {};
  (p.structures||[]).forEach(s => { if(s.name) structIndex[s.name] = (s.location||'').trim()||'Unknown'; });

  // Register persons FIRST so ships can detect person-name deployment targets
  const personWorldMap = {}; // person name → world they're deployed to
  ['apprentices','notables'].forEach(key => {
    const pType = key==='apprentices'?'apprentice':'notable';
    (p[key]||[]).forEach(person => {
      if(!person.name) return;
      (person.deployments||[]).forEach(d => {
        if(!(Number(d.qty)>0)) return;
        const loc = (d.location||'').trim();
        const world = loc || 'Unassigned';
        ensureWorld(world);
        if(!tree[world].persons[person.name]) {
          tree[world].persons[person.name] = { obj:person, qty:Number(d.qty), note:d.note||'', forces:[], ships:{}, type:pType };
          if(!personWorldMap[person.name]) personWorldMap[person.name] = world;
        } else {
          tree[world].persons[person.name].qty += Number(d.qty);
        }
      });
    });
  });

  // Register ships — if deployed to a person, nest under that person instead of creating a phantom world
  const shipWorldMap  = {}; // ship name → world (for force lookups)
  const shipPersonMap = {}; // ship name → person name they're under (null if standalone)
  (p.ships||[]).forEach(s => {
    if(!s.name) return;
    (s.deployments||[]).forEach(d => {
      if(!(Number(d.qty)>0)) return;
      const loc = (d.location||'').trim();
      if(personWorldMap[loc]!==undefined) {
        // Ship is deployed under a person — nest it there
        const world = personWorldMap[loc];
        const pd = tree[world].persons[loc];
        if(!pd.ships[s.name]) {
          pd.ships[s.name] = { obj:s, qty:Number(d.qty), note:d.note||'', forces:[] };
        } else {
          pd.ships[s.name].qty += Number(d.qty);
        }
        if(!shipWorldMap[s.name]) { shipWorldMap[s.name] = world; shipPersonMap[s.name] = loc; }
      } else {
        const world = loc || 'Unassigned';
        ensureWorld(world);
        if(!tree[world].ships[s.name]) {
          tree[world].ships[s.name] = { obj:s, qty:Number(d.qty), note:d.note||'', forces:[] };
        } else {
          tree[world].ships[s.name].qty += Number(d.qty);
        }
        if(!shipWorldMap[s.name]) { shipWorldMap[s.name] = world; shipPersonMap[s.name] = null; }
      }
    });
  });

  // Place deployed formations/assets/misc — check structures → ships → persons → planets → fallback
  ['formations','assets','miscItems'].forEach(key => {
    const type = key==='formations'?'Formation':key==='assets'?'Asset':'Misc';
    (p[key]||[]).forEach(item => {
      (item.deployments||[]).forEach(d => {
        if(!(Number(d.qty)>0)) return;
        const loc = (d.location||'').trim();
        const entry = { type, name:item.name, qty:d.qty, category:item.category||'', note:d.note||'', misc:item.misc||'', strength:item.strength||'' };
        if(structIndex[loc]!==undefined) {
          const world = structIndex[loc];
          ensureWorld(world);
          if(!tree[world].structures[loc]) tree[world].structures[loc] = { obj:null, forces:[] };
          tree[world].structures[loc].forces.push(entry);
        } else if(shipWorldMap[loc]!==undefined) {
          // Force is aboard a named ship
          const world = shipWorldMap[loc];
          const personName = shipPersonMap[loc];
          if(personName) {
            tree[world].persons[personName].ships[loc].forces.push(entry);
          } else {
            tree[world].ships[loc].forces.push(entry);
          }
        } else if(personWorldMap[loc]!==undefined) {
          // Force is assigned directly to a person
          const world = personWorldMap[loc];
          tree[world].persons[loc].forces.push(entry);
        } else if(PLANETS.includes(loc)) {
          ensureWorld(loc);
          tree[loc].generic.push(entry);
        } else {
          const world = loc || 'Unassigned';
          ensureWorld(world);
          tree[world].generic.push(entry);
        }
      });
    });
  });

  return tree;
}

function _deployToggle(world) {
  _deployedOpen[world] = !_deployedOpen[world];
  document.getElementById('app').innerHTML = renderDeployed();
}
function _deploySubToggle(wKey, sKey) {
  const k = wKey+'::'+sKey;
  _deployedSubOpen[k] = !_deployedSubOpen[k];
  document.getElementById('app').innerHTML = renderDeployed();
}

function _renderSubSection(world, label, forces, structObj) {
  const k = world+'::'+label;
  const open = !!_deployedSubOpen[k];
  const totalQty = forces.reduce((s,e)=>s+Number(e.qty),0);
  const isGeneric = label==='Generic';
  const icon = isGeneric ? '🌐' : '🏛';

  let body = '';
  if(open) {
    if(structObj) {
      const p = STATE.players[currentPlayer];
      const attachedForces = p ? getStructureForces(p, structObj.name) : [];
      body += `<div class="struct-info">
        <span style="color:var(--gold);font-weight:600">${esc(structObj.name)}</span>
        ${structObj.category?`  <span class="tag tag-grey" style="font-size:10px">${esc(structObj.category)}</span>`:''}
        ${structObj.quantity>1?`  <span class="dim" style="font-size:11px">×${structObj.quantity}</span>`:''}
        ${structObj.locationNote?`  <em style="font-size:11px;color:var(--text2)">${esc(structObj.locationNote)}</em>`:''}
        ${structObj.description?`<div class="dim" style="margin-top:4px;font-size:12px">${esc(structObj.description)}</div>`:''}
        ${structObj.misc?`<div style="margin-top:3px;font-size:11px;color:var(--text2)">${esc(structObj.misc)}</div>`:''}
      </div>`;
    }
    if(forces.length) {
      const rows = forces.map(e=>`<tr>
        <td class="gold">${esc(e.name)}</td>
        <td><span class="tag ${e.type==='Formation'?'tag-red':e.type==='Asset'?'tag-grey':'tag-blue'}">${e.type}</span></td>
        <td>${e.qty}</td>
        <td class="dim">${e.strength?(Number(e.strength)*Number(e.qty)).toLocaleString()+' men':'—'}</td>
        <td class="dim">${esc(e.category)}</td>
        <td class="dim">${e.note?`<em>${esc(e.note)}</em>`:'—'}</td>
      </tr>`).join('');
      body += `<div class="tbl-wrap"><table>
        <thead><tr><th>Name</th><th>Type</th><th>Qty</th><th>Strength (total)</th><th>Category</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    } else {
      body += `<div class="dim" style="font-size:12px;padding:4px 0">No forces deployed here.</div>`;
    }
  }

  const totalStrength = depStrength(forces);
  const wEsc = world.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const lEsc = label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const subMeta = [
    totalQty>0 ? `${totalQty} unit${totalQty!==1?'s':''}` : 'Empty',
    totalStrength>0 ? `${totalStrength.toLocaleString()} men` : null,
    structObj ? 'Structure' : null
  ].filter(Boolean).join(' · ');
  return `<div class="subloc-row">
    <div class="subloc-hdr" onclick="_deploySubToggle('${wEsc}','${lEsc}')">
      <span class="subloc-name">${icon} ${esc(label)}</span>
      <span class="subloc-meta">${subMeta} ${open?'▲':'▼'}</span>
    </div>
    ${open?`<div class="subloc-body">${body}</div>`:''}
  </div>`;
}

      ${s.role?`  <span class="tag tag-grey" style="font-size:10px">${esc(s.role)}</span>`:''}
      ${s.quantity>1?`  <span class="dim" style="font-size:11px">×${s.quantity} ships</span>`:''}

      ${s.specifications?`<div style="margin-top:3px;font-size:11px;color:var(--text2)">${esc(s.specifications)}</div>`:''}
    </div>`;
    if(shipData.forces.length) {
      const rows = shipData.forces.map(e=>`<tr>
        <td class="gold">${esc(e.name)}</td>
        <td><span class="tag ${typeColor[e.type]||'tag-grey'}">${e.type}</span></td>

        <td class="dim">${esc(e.category)}</td>
        <td class="dim">${e.note?`<em>${esc(e.note)}</em>`:'—'}</td>
      </tr>`).join('');

        <thead><tr><th>Aboard</th><th>Type</th><th>Qty</th><th>Strength</th><th>Category</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    } else {
      body += `<div class="dim" style="font-size:12px;padding:4px 0">No forces aboard.</div>`;
    }
  }
  const totalAboard = shipData.forces.reduce((s,e)=>s+Number(e.qty),0);
  const totalStrength = depStrength(shipData.forces);
  const meta = [
    `${shipData.qty} ship${shipData.qty!==1?'s':''}`,
    totalAboard>0?`${totalAboard} unit${totalAboard!==1?'s':''} aboard`:null,
    totalStrength>0?`${totalStrength.toLocaleString()} men`:null,
    s.class||null
  ].filter(Boolean).join(' · ');
  return `<div class="subloc-row">
    <div class="subloc-hdr" onclick="_deploySubToggle('${wEsc}','${kEsc}')">
      <span class="subloc-name">🚀 ${esc(shipName)}</span>
      <span class="subloc-meta">${meta} ${open?'▲':'▼'}</span>
    </div>
    ${open?`<div class="subloc-body">${body}</div>`:''}
  </div>`;
}

function _renderPersonSection(world, personName, personData) {
  const k = world+'::person::'+personName;
  const open = !!_deployedSubOpen[k];
  const person = personData.obj;
  const wEsc = world.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const kEsc = ('person::'+personName).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const typeColor = { Formation:'tag-red', Asset:'tag-grey', Misc:'tag-blue' };
  const isAppr = personData.type==='apprentice';
  const icon = isAppr ? '⚡' : '👤';

  const nestedShipNames = Object.keys(personData.ships||{});
  let body = '';
  if(open) {
    body += `<div class="struct-info">
      <span style="color:var(--gold);font-weight:600">${esc(personName)}</span>
      ${isAppr&&person.rank?`<span class="tag tag-red" style="font-size:10px">${esc(person.rank)}</span>`:''}
      ${!isAppr&&person.role?`<span class="tag tag-blue" style="font-size:10px">${esc(person.role)}</span>`:''}
      ${person.species?`<span class="tag tag-grey" style="font-size:10px">${esc(person.species)}</span>`:''}
      ${personData.note?`<em style="font-size:11px;color:var(--text2)">${esc(personData.note)}</em>`:''}
      ${person.description?`<div class="dim" style="margin-top:4px;font-size:12px">${esc(person.description)}</div>`:''}
    </div>`;
    if(personData.forces.length) {
      const rows = personData.forces.map(e=>`<tr>
        <td class="gold">${esc(e.name)}</td>
        <td><span class="tag ${typeColor[e.type]||'tag-grey'}">${e.type}</span></td>
        <td>${e.qty}</td>
        <td class="dim">${e.strength?(Number(e.strength)*Number(e.qty)).toLocaleString()+' men':'—'}</td>
        <td class="dim">${esc(e.category)}</td>
        <td class="dim">${e.note?`<em>${esc(e.note)}</em>`:'—'}</td>
      </tr>`).join('');
      body += `<div class="tbl-wrap"><table>
        <thead><tr><th>Name</th><th>Type</th><th>Qty</th><th>Strength (total)</th><th>Category</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    } else if(!nestedShipNames.length) {
      body += `<div class="dim" style="font-size:12px;padding:4px 0">No forces assigned to this person.</div>`;
    }
    // Render ships nested under this person
    nestedShipNames.forEach(sn => { body += _renderShipSection(world, sn, personData.ships[sn]); });
  }
  const allPersonForces = [
    ...(personData.forces||[]),
    ...nestedShipNames.flatMap(sn=>(personData.ships[sn].forces||[]))
  ];
  const totalForces = allPersonForces.reduce((s,e)=>s+Number(e.qty),0);
  const totalStrength = depStrength(allPersonForces);
  const meta = [
    totalForces>0 ? `${totalForces} force${totalForces!==1?'s':''}` : (nestedShipNames.length?null:'No assigned forces'),
    nestedShipNames.length ? `${nestedShipNames.length} ship${nestedShipNames.length!==1?'s':''}` : null,
    totalStrength>0 ? `${totalStrength.toLocaleString()} men` : null,
    isAppr ? (person.rank||'Apprentice') : (person.role||'Notable'),
  ].filter(Boolean).join(' · ');

  return `<div class="subloc-row">
    <div class="subloc-hdr" onclick="_deploySubToggle('${wEsc}','${kEsc}')">

    </div>
    ${open?`<div class="subloc-body">${body}</div>`:''}
  </div>`;
}

function renderDeployed() {
  const p = STATE.players[currentPlayer];
  if(!p) return '';
  const tree = _buildLocationTree(p);
  const worlds = Object.keys(tree).sort((a,b)=>{
    if(a==='Unassigned'||a==='Unknown') return 1;
    if(b==='Unassigned'||b==='Unknown') return -1;
    return a.localeCompare(b);
  });

  if(!worlds.length) return `<div class="card"><div class="dim" style="padding:24px;text-align:center">No deployed forces or structures.</div></div>`;

  return worlds.map(world => {
    const wd = tree[world];
    const open = !!_deployedOpen[world];
    const structNames  = Object.keys(wd.structures);
    const shipNames    = Object.keys(wd.ships||{});
    const personNames  = Object.keys(wd.persons||{});
    const allForces = [
      ...wd.generic,
      ...structNames.flatMap(n=>wd.structures[n].forces),
      ...shipNames.flatMap(n=>(wd.ships[n].forces||[])),
      ...personNames.flatMap(n=>[
        ...(wd.persons[n].forces||[]),
        ...Object.values(wd.persons[n].ships||{}).flatMap(sh=>sh.forces||[])
      ])
    ];
    const totalUnits = allForces.reduce((s,e)=>s+Number(e.qty),0)
      + shipNames.reduce((s,n)=>s+Number(wd.ships[n].qty||0),0)
      + personNames.reduce((s,n)=>{
          const pd = wd.persons[n];
          return s + Number(pd.qty||0) + Object.values(pd.ships||{}).reduce((ss,sh)=>ss+Number(sh.qty||0),0);
        },0);
    const totalStrength = depStrength(allForces);

    let body = '';
    if(open) {
      if(wd.generic.length) body += _renderSubSection(world,'Generic',wd.generic,null);
      structNames.forEach(n=>{ body += _renderSubSection(world,n,wd.structures[n].forces,wd.structures[n].obj); });
      shipNames.forEach(n=>{ body += _renderShipSection(world,n,wd.ships[n]); });
      personNames.forEach(n=>{ body += _renderPersonSection(world,n,wd.persons[n]); });
    }

    const wEsc = world.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const metaParts = [
      totalUnits>0?`${totalUnits} unit${totalUnits!==1?'s':''}`:null,
      totalStrength>0?`${totalStrength.toLocaleString()} men`:null,
      structNames.length?`${structNames.length} structure${structNames.length!==1?'s':''}`:null,
      shipNames.length?`${shipNames.length} ship${shipNames.length!==1?'s':''}`:null,
      personNames.length?`${personNames.length} person${personNames.length!==1?'s':''}`:null
    ].filter(Boolean).join(' · ') || 'Empty';
    return `<div class="world-card">
      <div class="world-hdr" onclick="_deployToggle('${wEsc}')">
        <span style="font-size:16px">📍</span>
        <span class="world-name">${esc(world)}</span>
        <span class="world-meta">${metaParts}</span>
        <span class="chevron">${open?'▲':'▼'}</span>
      </div>
      ${open?`<div class="world-body">${body}</div>`:''}
    </div>`;
  }).join('');
}

// ============================================================
// DEPLOY MODAL
// ============================================================
let _depEdits = [];
let _depListKey = '';
let _depItemId = '';
let _depPid = null;
let _depSearch = {};
let _depDdOpen = -1;

function showDeployModal(listKey, itemId, pid) {
  _depPid = pid || currentPlayer;
  const p = STATE.players[_depPid];
  const item = p[listKey].find(x=>x.id===itemId);
  if(!item) return;
  _depListKey = listKey;
  _depItemId = itemId;
  _depSearch = {};
  _depDdOpen = -1;
  _depEdits = (item.deployments||[]).map(d=>({location:d.location||'',note:d.note||'',qty:Number(d.qty)||0}));
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'dep-modal-overlay';
  document.body.appendChild(modal);
  _renderDepModal();
}

function _depHdr() {
  const p = STATE.players[_depPid||currentPlayer];
  const item = p&&p[_depListKey]&&p[_depListKey].find(x=>x.id===_depItemId);
  if(!item) return '';
  const qty = item.quantity||1; // default 1 for persons (apprentices/notables)
  const totalDep = _depEdits.reduce((s,d)=>s+(Number(d.qty)||0),0);
  const undep = Math.max(0,qty-totalDep);
  const over = totalDep>qty;
  return `Total: <strong>${qty}</strong> &nbsp;·&nbsp; Deployed: <strong style="color:${over?'var(--red2)':'var(--green)'}">${totalDep}</strong> &nbsp;·&nbsp; Undeployed: <strong>${undep}</strong>${over?' <span style="color:var(--red2)">⚠ Exceeds total!</span>':''}`;
}

function _renderLocOptions(i, text) {
  const p = STATE.players[_depPid||currentPlayer];
  if(!p) return '';
  const q = (text||'').toLowerCase().trim();
  const managed = getLocationsFor(p.id);
  const structs = (p.structures||[]).filter(s=>s.name&&s.name.trim());
  const managedNames = new Set(managed.map(l=>l.name));
  let html = '';
  ['Planet','Character','Structure'].forEach(cls => {
    const items = managed.filter(l=>l.classification===cls&&(!q||l.name.toLowerCase().includes(q)));
    if(!items.length) return;
    html += `<div class="loc-sec">${LOC_ICON[cls]} ${cls}s</div>`;
    html += items.map(l=>`<div class="loc-opt" onclick="event.stopPropagation();_depSelectLoc(${i},'${l.name.replace(/'/g,"\\'")}')"> ${esc(l.name)}</div>`).join('');
  });
  const filtS = q ? structs.filter(s=>s.name.toLowerCase().includes(q)) : structs;
  if(filtS.length) {
    html += `<div class="loc-sec">🏛 Your Structures</div>`;
    html += filtS.map(s=>`<div class="loc-opt" onclick="event.stopPropagation();_depSelectLoc(${i},'${s.name.replace(/'/g,"\\'")}')"><span>🏛 ${esc(s.name)}</span><span class="dim" style="font-size:11px;margin-left:8px">${esc(s.location||'')}</span></div>`).join('');
  }
  const ships = (p.ships||[]).filter(s=>s.name&&s.name.trim());
  const filtShips = q ? ships.filter(s=>s.name.toLowerCase().includes(q)) : ships;
  if(filtShips.length) {
    html += `<div class="loc-sec">🚀 Your Ships</div>`;
    html += filtShips.map(s=>{
      const depLoc = (s.deployments||[]).filter(d=>d.qty>0).map(d=>d.location||'?').join(', ');
      return `<div class="loc-opt" onclick="event.stopPropagation();_depSelectLoc(${i},'${s.name.replace(/'/g,"\\'")}')"><span>🚀 ${esc(s.name)}</span><span class="dim" style="font-size:11px;margin-left:8px">${esc(s.class||'')}${depLoc?' · '+depLoc:''}</span></div>`;
    }).join('');
  }
  const allPersons = [
    ...(p.apprentices||[]).filter(a=>a.name&&a.name.trim()).map(a=>({...a,_pType:'Apprentice'})),
    ...(p.notables||[]).filter(n=>n.name&&n.name.trim()).map(n=>({...n,_pType:'Notable'}))
  ];
  const filtPersons = q ? allPersons.filter(per=>per.name.toLowerCase().includes(q)) : allPersons;
  if(filtPersons.length) {
    html += `<div class="loc-sec">👤 Your People</div>`;
    html += filtPersons.map(per=>{
      const depLoc = (per.deployments||[]).filter(d=>d.qty>0).map(d=>d.location||'?').join(', ');
      return `<div class="loc-opt" onclick="event.stopPropagation();_depSelectLoc(${i},'${per.name.replace(/'/g,"\\'")}')"><span>👤 ${esc(per.name)}</span><span class="dim" style="font-size:11px;margin-left:8px">${esc(per._pType)}${depLoc?' · '+depLoc:''}</span></div>`;
    }).join('');
  }
  const allNames = [...managed.map(l=>l.name),...structs.map(s=>s.name),...ships.map(s=>s.name),...allPersons.map(per=>per.name)];
  const exactExists = allNames.some(n=>n.toLowerCase()===q);
  if(text&&!exactExists) html += `<div class="loc-opt loc-create" onclick="event.stopPropagation();_depSelectLoc(${i},'${text.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">+ Create &ldquo;${esc(text)}&rdquo;</div>`;
  if(!html) html = `<div class="loc-opt" style="color:var(--text2);cursor:default">No locations found</div>`;
  return html;
}

function _renderDepRow(d, i) {
  return `<div class="dep-row" data-idx="${i}" style="display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;flex-wrap:wrap">
    <input type="number" value="${d.qty||0}" min="0" placeholder="Qty"
           style="width:64px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit"
           oninput="_depEdits[${i}].qty=Math.max(0,parseInt(this.value)||0);document.getElementById('dep-hdr').innerHTML=_depHdr()">
    <div class="loc-selector" style="flex:2;min-width:140px">
      ${d.location
        ? `<div class="loc-chip">📍 ${esc(d.location)} <span class="lx" onclick="event.stopPropagation();_depClearLoc(${i})">✕</span></div>`
        : `<input type="text" class="loc-search-inp" id="loc-inp-${i}"
                  value="${esc(_depSearch[i]||'')}" placeholder="Search location…" autocomplete="off"
                  oninput="_depFilter(${i},this.value)" onfocus="_depOpenDd(${i})"
                  onclick="event.stopPropagation()">
           <div class="loc-dd" id="loc-dd-${i}">${_depDdOpen===i?_renderLocOptions(i,_depSearch[i]||''):''}</div>`
      }
    </div>
    <input type="text" value="${esc(d.note||'')}" placeholder="Location note…"
           style="flex:2;min-width:100px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit"
           oninput="_depEdits[${i}].note=this.value">
    <button class="btn btn-red btn-sm" style="flex-shrink:0" onclick="_depRemoveRow(${i})">✕</button>
  </div>`;
}

function _renderDepModal() {
  const p = STATE.players[_depPid||currentPlayer];
  const item = p[_depListKey].find(x=>x.id===_depItemId);
  if(!item) return;
  const overlay = document.getElementById('dep-modal-overlay');
  if(!overlay) return;
  overlay.innerHTML = `<div class="modal" style="max-width:580px" onclick="_depCloseDdOnOutside(event)">
    <h2>Reposition: ${esc(item.name)}</h2>
    <p class="dim" style="margin-bottom:14px" id="dep-hdr">${_depHdr()}</p>
    <div style="margin-bottom:8px;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px">Deployment Locations</div>
    <div id="dep-rows">${_depEdits.map((d,i)=>_renderDepRow(d,i)).join('')}</div>
    <button class="btn btn-ghost btn-sm" onclick="_depAddRow()" style="margin-bottom:14px">+ Add Location</button>
    <div class="form-row">
      <label>General Notes</label>
      <input type="text" id="dep-misc" value="${esc(item.misc||'')}" placeholder="Any additional notes">
    </div>
    ${!isAdmin ? `<div class="form-row">
      <label>Request Note <span class="dim" style="font-size:11px">(explain your redeployment to the GM)</span></label>
      <input type="text" id="dep-req-note" placeholder="e.g. Moving forces to Balmorra for the upcoming campaign">
    </div>` : ''}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('dep-modal-overlay').remove()">Cancel</button>
      ${isAdmin
        ? `<button class="btn btn-gold" onclick="_saveDepModal()">Save</button>`
        : `<button class="btn btn-gold" onclick="_submitDepRequest()">Submit Request</button>`}
    </div>
  </div>`;
}

function _depOpenDd(i) {
  _depDdOpen = i;
  const dd = document.getElementById('loc-dd-'+i);
  if(dd) dd.innerHTML = _renderLocOptions(i, _depSearch[i]||'');
}
function _depFilter(i, text) {
  _depSearch[i] = text;
  _depDdOpen = i;
  const dd = document.getElementById('loc-dd-'+i);
  if(dd) dd.innerHTML = _renderLocOptions(i, text);
}
function _depCloseDdOnOutside(e) {
  if(!e.target.closest('.loc-selector')) {
    _depDdOpen = -1;
    document.querySelectorAll('.loc-dd').forEach(d=>d.innerHTML='');
  }
}
function _depSelectLoc(i, loc) {
  _depEdits[i].location = loc;
  _depSearch[i] = '';
  _depDdOpen = -1;
  // Swap just this row in place
  const row = document.querySelector(`.dep-row[data-idx="${i}"]`);
  if(row) { const tmp = document.createElement('div'); tmp.innerHTML = _renderDepRow(_depEdits[i],i); row.replaceWith(tmp.firstElementChild); }
}
function _depClearLoc(i) {
  _depEdits[i].location = '';
  _depSearch[i] = '';
  const row = document.querySelector(`.dep-row[data-idx="${i}"]`);
  if(row) { const tmp = document.createElement('div'); tmp.innerHTML = _renderDepRow(_depEdits[i],i); row.replaceWith(tmp.firstElementChild); }
  setTimeout(()=>{ const inp = document.getElementById('loc-inp-'+i); if(inp){inp.focus();_depOpenDd(i);} },10);
}
function _depAddRow() { _depEdits.push({location:'',note:'',qty:0}); _renderDepModal(); setTimeout(()=>{ const inp = document.getElementById('loc-inp-'+(_depEdits.length-1)); if(inp)inp.focus(); },10); }
function _depRemoveRow(i) { _depEdits.splice(i,1); _renderDepModal(); }

function _saveDepModal() {
  const p = STATE.players[_depPid||currentPlayer];
  const item = p[_depListKey].find(x=>x.id===_depItemId);
  if(!item) return;
  const totalDep = _depEdits.reduce((s,d)=>s+(Number(d.qty)||0),0);
  if(totalDep>item.quantity){ notify('Deployed ('+totalDep+') exceeds quantity ('+item.quantity+')',true); return; }
  item.deployments = _depEdits.filter(d=>d.qty>0||d.location).map(d=>({location:d.location||'',qty:Number(d.qty)||0,note:d.note||''}));
  item.undeployed = item.quantity - totalDep;
  item.misc = document.getElementById('dep-misc').value;
  document.getElementById('dep-modal-overlay').remove();
  saveState();
  notify('Repositioned: '+item.name);
  render();
}

function _submitDepRequest() {
  const p = STATE.players[currentPlayer];
  const item = p[_depListKey].find(x=>x.id===_depItemId);
  if(!item) return;
  const totalDep = _depEdits.reduce((s,d)=>s+(Number(d.qty)||0),0);
  if(totalDep>item.quantity){ notify('Deployed ('+totalDep+') exceeds quantity ('+item.quantity+')',true); return; }
  const note = (document.getElementById('dep-req-note')||{}).value||'';
  const req = {
    id: newId(),
    type: 'deployment',
    playerId: currentPlayer,
    playerName: p.displayName,
    listKey: _depListKey,
    itemId: _depItemId,
    itemName: item.name,
    currentDeployments: JSON.parse(JSON.stringify(item.deployments||[])),
    proposedDeployments: _depEdits.filter(d=>d.qty>0||d.location).map(d=>({location:d.location||'',qty:Number(d.qty)||0,note:d.note||''})),
    proposedUndeployed: item.quantity - totalDep,
    proposedMisc: (document.getElementById('dep-misc')||{}).value||item.misc||'',
    note,
    status: 'pending',
    date: new Date().toISOString()
  };
  STATE.deploymentRequests = STATE.deploymentRequests||[];
  STATE.deploymentRequests.push(req);
  document.getElementById('dep-modal-overlay').remove();
  saveState();
  notify('Redeployment request submitted!');
  render();
}

let _alpOpen = null, _alpSearch = {};
function _alpKey(pid, idx) { return pid + '_' + idx; }
function _alpOpts(pid, idx, text) {
  const p = STATE.players[pid]; if(!p) return '';
  const q = (text||'').toLowerCase().trim();
  const managed = getLocationsFor(pid);
  let html = '';
  ['Planet','Character','Structure'].forEach(cls => {
    const items = managed.filter(l=>l.classification===cls&&(!q||l.name.toLowerCase().includes(q)));
    if(!items.length) return;
    html += `<div class="loc-sec">${LOC_ICON[cls]} ${cls}s</div>`;
    html += items.map(l=>`<div class="loc-opt" onclick="event.stopPropagation();_alpSelect('${pid}',${idx},'${l.name.replace(/'/g,"\\'")}')"> ${esc(l.name)}</div>`).join('');
  });
  const exactExists = managed.some(l=>l.name.toLowerCase()===q);
  if(text&&!exactExists) html += `<div class="loc-opt loc-create" onclick="event.stopPropagation();_alpSelect('${pid}',${idx},'${text.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">+ Create &ldquo;${esc(text)}&rdquo;</div>`;
  if(!html) html = `<div class="loc-opt" style="color:var(--text2);cursor:default">No locations found</div>`;
  return html;
}
function _alpOpenFn(pid, idx) { const k=_alpKey(pid,idx); _alpOpen=k; const dd=document.getElementById('alp-dd-'+k); if(dd) dd.innerHTML=_alpOpts(pid,idx,_alpSearch[k]||''); }
function _alpFilter(pid, idx, v) { const k=_alpKey(pid,idx); _alpSearch[k]=v; _alpOpen=k; const dd=document.getElementById('alp-dd-'+k); if(dd) dd.innerHTML=_alpOpts(pid,idx,v); }
function _alpSelect(pid, idx, loc) { const k=_alpKey(pid,idx); _alpOpen=null; _alpSearch[k]=''; if(STATE.players[pid]?.structures) STATE.players[pid].structures[idx].location=loc; saveState(); render(); }
function _alpClear(pid, idx) { const k=_alpKey(pid,idx); _alpOpen=null; _alpSearch[k]=''; if(STATE.players[pid]?.structures) STATE.players[pid].structures[idx].location=''; saveState(); render(); }
function _alpCellHtml(pid, idx, loc) {
  const k = _alpKey(pid,idx);
  return loc
    ? `<div class="loc-chip">📍 ${esc(loc)} <span class="lx" onclick="event.stopPropagation();_alpClear('${pid}',${idx})">✕</span></div>`
    : `<input type="text" class="loc-search-inp" value="${esc(_alpSearch[k]||'')}" placeholder="Search location…" autocomplete="off" style="width:100%"
         oninput="_alpFilter('${pid}',${idx},this.value)" onfocus="_alpOpenFn('${pid}',${idx})" onclick="event.stopPropagation()">
       <div class="loc-dd" id="alp-dd-${k}">${_alpOpen===k?_alpOpts(pid,idx,_alpSearch[k]||''):''}</div>`;
}

function showPurchaseModal(itemId) {
  const item = STATE.shopItems.find(i=>i.id===itemId);
  if(!item) return;
  const p = STATE.players[currentPlayer];
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal">
    <h2>Request Purchase: ${esc(item.name)}</h2>
    <p class="dim" style="margin-bottom:14px">${esc(item.description)}</p>

function submitPurchase(itemId) {
  const item = STATE.shopItems.find(i=>i.id===itemId);
  if(!item) return;
  const qty = parseInt(document.getElementById('pur-qty').value)||1;
  const note = document.getElementById('pur-note').value;
  const req = {
    id: newId(),
    playerId: currentPlayer,
    playerName: STATE.players[currentPlayer].displayName,
    itemId, itemName: item.name,
    price: item.price, quantity: qty,
    totalCost: item.price * qty,
    note, adminNote: '',
    status: 'pending',
    date: new Date().toISOString()
  };
  STATE.purchaseRequests = STATE.purchaseRequests || [];
  STATE.purchaseRequests.push(req);
  document.querySelector('.modal-overlay').remove();
  saveState();
  notify('Purchase request submitted!');
  render();
}

function handleCharImagePaste(e, pid) {
  e.preventDefault();
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(ev) {
        STATE.players[pid].character.charImage = ev.target.result;
        saveState();
        notify('Character image saved.');
        render();
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
  notify('No image found in clipboard.');
}

function adminMoveRow(pid, fromList, idx, toList) {
  const p = STATE.players[pid];
  if(!p||!p[fromList]) return;
  const item = p[fromList][idx];
  if(!item) return;
  const moved = JSON.parse(JSON.stringify(item));
  moved.id = newId();
  const deployable = ['formations','assets','miscItems'];
  const fromDep = deployable.includes(fromList);
  const toDep = deployable.includes(toList);
  if(fromDep && !toDep) {
    // deployable → structure: use first deployment location, drop deployment fields
    const first = (moved.deployments||[])[0];
    moved.location = first ? first.location : '';
    delete moved.deployments;
    delete moved.undeployed;
  } else if(!fromDep && toDep) {
    // structure → deployable: convert location to a single deployment
    const loc = moved.location||'';
    moved.deployments = loc ? [{location:loc, qty:Number(moved.quantity)||1, note:''}] : [];
    moved.undeployed = 0;
    delete moved.location;
  }
  p[fromList].splice(idx, 1);
  p[toList] = p[toList]||[];
  p[toList].push(moved);
  saveState();
  notify(`"${moved.name}" moved to ${MOVABLE_LISTS[toList]}`);
  render();
}

function adminUpdateCell(pid, listKey, idx, field, value) {
  const p = STATE.players[pid];
  if(!p||!p[listKey]) return;
  const item = p[listKey][idx];

  item[field] = ['quantity','deployed','undeployed','strength','number','adultPop','gdpPerCapita','taxPercent'].includes(field) ? unNum(value) : value;
  saveState();
}
function adminDeleteRow(pid, listKey, idx) {
  if(!confirm('Delete this row?')) return;
  STATE.players[pid][listKey].splice(idx,1);

}
function adminAddRow(pid, listKey) {
  const fields = ADMIN_LIST_FIELDS[listKey] || [];
  const newRow = { id: newId() };
  fields.forEach(f => newRow[f] = ['quantity'].includes(f)?0:'');
  if(['formations','assets','miscItems','ships'].includes(listKey)) {
    newRow.deployments = [];
    newRow.undeployed = 0;
  }
  if(['apprentices','notables'].includes(listKey)) {
    newRow.quantity = 1;
    newRow.deployments = [];
    newRow.undeployed = 0;
  }
  STATE.players[pid][listKey] = STATE.players[pid][listKey]||[];
  STATE.players[pid][listKey].push(newRow);
  saveState(); render();
}

let _siImageData = ''; // base64 or URL for the currently open shop-item modal
function _siImgPaste(e) {
  e.preventDefault();
  const items = e.clipboardData?.items;
  if(items) {
    for(let i=0;i<items.length;i++) {
      if(items[i].type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = ev => { _siImageData = ev.target.result; _siImgPreview(); };
        reader.readAsDataURL(items[i].getAsFile());
        return;
      }
    }
  }
  const text = e.clipboardData?.getData('text/plain');
  if(text && (text.startsWith('http')||text.startsWith('data:'))) { _siImageData = text; _siImgPreview(); return; }
  notify('No image found in clipboard.', true);
}
function _siImgFile(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { _siImageData = ev.target.result; _siImgPreview(); };
  reader.readAsDataURL(file);
}
function _siImgUrlInput(val) {
  _siImageData = val;
  const zone = document.getElementById('si-img-zone');
  if(zone) zone.innerHTML = val ? `<img src="${val}" style="max-height:120px;max-width:100%;border-radius:4px;object-fit:contain">` : `<div class="paste-hint">🖼 Click here, then Ctrl+V to paste</div>`;
}
function _siImgClear() {
  _siImageData = '';
  const u = document.getElementById('si-img-url'); if(u) u.value = '';
  _siImgPreview();
}
function _siImgPreview() {
  const zone = document.getElementById('si-img-zone');
  const urlInp = document.getElementById('si-img-url');
  if(zone) zone.innerHTML = _siImageData ? `<img src="${_siImageData}" style="max-height:120px;max-width:100%;border-radius:4px;object-fit:contain">` : `<div class="paste-hint">🖼 Click here, then Ctrl+V to paste</div>`;
  if(urlInp && !_siImageData.startsWith('data:')) urlInp.value = _siImageData;
  else if(urlInp && _siImageData.startsWith('data:')) urlInp.value = '';
}

function approveRequest(id) {
  const req = STATE.purchaseRequests.find(r=>r.id===id);
  if(!req) return;
  const p = STATE.players[req.playerId];
  if(!p) { notify('Player not found', true); return; }
  if(p.finances.balance < req.totalCost) {
    if(!confirm(`Player only has ${fmt(p.finances.balance)} credits. Approve anyway?`)) return;
  }
  req.status = 'approved';
  p.finances.balance -= req.totalCost;

  // Add unit to player's list if the shop item specifies one
  const shopItem = (STATE.shopItems||[]).find(i=>i.id===req.itemId);
  const validLists = ['formations','assets','ships','structures','miscItems'];
  if(shopItem && validLists.includes(shopItem.unit)) {
    const listKey = shopItem.unit;
    p[listKey] = p[listKey]||[];
    const newItem = { id:newId(), name:shopItem.name, quantity:req.quantity, category:shopItem.category||'', description:shopItem.description||'', misc:'', imageUrl:shopItem.imageUrl||'' };
    if(listKey === 'formations')  { newItem.strength=shopItem.strength||''; newItem.deployments=[]; newItem.undeployed=req.quantity; }
    if(listKey === 'assets')      { newItem.deployments=[]; newItem.undeployed=req.quantity; }
    if(listKey === 'ships')       { newItem.class=shopItem.class||''; newItem.role=shopItem.role||''; newItem.specifications=shopItem.specifications||''; newItem.deployments=[]; newItem.undeployed=req.quantity; }
    if(listKey === 'structures')  { newItem.location=shopItem.location||''; newItem.locationNote=shopItem.locationNote||''; newItem.attachedForces=''; }
    if(listKey === 'miscItems')   { newItem.deployments=[]; newItem.undeployed=req.quantity; }
    p[listKey].push(newItem);
    notify(`Approved — ${shopItem.name} ×${req.quantity} added to ${p.displayName}'s ${listKey}.`);
  } else {
    notify(`Approved. ${fmtC(req.totalCost)} deducted from ${p.displayName}.`);
  }

  // Auto-add upkeep income row if the shop item has a wage
  const wageVal = parseFloat(shopItem?.wage)||0;
  if(wageVal > 0) {
    p.income = p.income||[];
    p.income.push({ id:newId(), name:`${shopItem.name} (Wage)`, quantity:req.quantity, income:0, upkeep:wageVal, net:-wageVal, totalNet:-(wageVal*req.quantity) });
    notify(`Added upkeep: ${fmtC(wageVal)}/unit × ${req.quantity} = ${fmtC(wageVal*req.quantity)}/period for ${p.displayName}.`);
  }

  saveState(); render();
}
function denyRequest(id) {
  const req = STATE.purchaseRequests.find(r=>r.id===id);
  if(!req) return;
  req.status = 'denied';
  saveState(); notify('Request denied.'); render();
}
function addAdminNote(id) {
  const req = STATE.purchaseRequests.find(r=>r.id===id);
  if(!req) return;
  const note = prompt('Admin note:', req.adminNote||'');
  if(note !== null) { req.adminNote = note; saveState(); render(); }
}

function approveDeployRequest(id) {
  const req = (STATE.deploymentRequests||[]).find(r=>r.id===id);
  if(!req) return;
  const p = STATE.players[req.playerId];
  if(!p) { notify('Player not found', true); return; }
  const list = p[req.listKey];
  if(!list) { notify('List not found', true); return; }
  const item = list.find(x=>x.id===req.itemId);
  if(!item) { notify('Unit not found', true); return; }
  item.deployments = req.proposedDeployments;
  item.undeployed = req.proposedUndeployed;
  if(req.proposedMisc !== undefined) item.misc = req.proposedMisc;
  req.status = 'approved';
  saveState();
  notify(`Redeployment approved for ${req.itemName}.`);
  render();
}

function denyDeployRequest(id) {
  const req = (STATE.deploymentRequests||[]).find(r=>r.id===id);
  if(!req) return;
  req.status = 'denied';
  saveState();
  notify('Redeployment request denied.');
  render();
}

let _adminDepSel = null; // currently selected location key, e.g. 'planet::Dromund Kaas' or 'struct::Main Base::pid'

function _getAllGenericLocs() {
  // All managed locations (admin sees all)
  const locs = new Set((STATE.locations||[]).map(l=>l.name));
  // Also pull in any deployed locations not yet in managed list
  const structNames = new Set();
  Object.values(STATE.players).forEach(p=>(p.structures||[]).forEach(s=>{if(s.name)structNames.add(s.name);}));
  Object.values(STATE.players).forEach(p=>{
    ['formations','assets','miscItems'].forEach(k=>(p[k]||[]).forEach(item=>(item.deployments||[]).forEach(d=>{
      if(d.location&&d.location.trim()&&!structNames.has(d.location.trim())) locs.add(d.location.trim());
    })));
  });
  return [...locs].sort();
}

function _getAllStructLocs() {
  const structs = [];
  Object.values(STATE.players).forEach(p=>{
    (p.structures||[]).forEach(s=>{
      structs.push({ name:s.name, location:s.location||'', locationNote:s.locationNote||'', pid:p.id, playerName:p.displayName });
    });
  });
  return structs.sort((a,b)=>a.name.localeCompare(b.name));
}

function _getForcesAt(locType, locName, pid) {
  // locType: 'generic' or 'struct'
  const forces = [];
  Object.values(STATE.players).forEach(p=>{
    ['formations','assets','miscItems'].forEach(k=>{
      const type = k==='formations'?'Formation':k==='assets'?'Asset':'Misc';
      (p[k]||[]).forEach(item=>{
        (item.deployments||[]).forEach((d,depIdx)=>{
          if(Number(d.qty)<=0) return;
          const match = locType==='generic' ? d.location===locName : d.location===locName;
          if(match) forces.push({
            pid:p.id, playerName:p.displayName, listKey:k, itemId:item.id, depIdx,
            name:item.name, type, qty:d.qty, strength:item.strength||'', note:d.note||'', location:d.location
          });
        });
      });
    });
  });
  return forces;
}

function _allLocOptions() {
  const generic = _getAllGenericLocs();
  const structs = _getAllStructLocs();
  return [
    ...generic.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`),
    ...structs.map(s=>`<option value="${esc(s.name)}">🏛 ${esc(s.name)}</option>`)
  ].join('');
}

function adminMoveDep(pid, listKey, itemId, depIdx, newLoc) {
  if(!newLoc) return;
  const p = STATE.players[pid];
  if(!p) return;
  const item = (p[listKey]||[]).find(x=>x.id===itemId);
  if(!item||!item.deployments[depIdx]) return;
  const dep = item.deployments[depIdx];
  if(dep.location===newLoc) return;
  const existIdx = item.deployments.findIndex((d,i)=>i!==depIdx&&d.location===newLoc);
  if(existIdx>=0) {
    item.deployments[existIdx].qty += dep.qty;
    item.deployments.splice(depIdx,1);
  } else {
    dep.location = newLoc;
  }
  saveState();
  notify(`Moved to ${newLoc}`);
  document.getElementById('app').innerHTML = renderAdminDeploy();
}

function adminAddCustomLoc() {
  const inp = document.getElementById('new-generic-inp');

  STATE.customLocations = STATE.customLocations||[];

function adminRemoveCustomLoc(loc) {

}
